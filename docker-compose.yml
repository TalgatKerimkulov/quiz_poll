services:
  vasit-app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: quiz_poll_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: quiz_poll
      DB_USERNAME: quiz_poll
      DB_PASSWORD: quiz_poll
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quiz_poll

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: quiz_poll_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vasit-app
    networks:
      - quiz_poll

  postgres:
    image: postgres:15-alpine
    container_name: quiz_poll_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quiz_poll
      POSTGRES_USER: quiz_poll
      POSTGRES_PASSWORD: quiz_poll
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz_poll -d quiz_poll"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quiz_poll

  redis:
    image: redis:7-alpine
    container_name: quiz_poll_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quiz_poll

networks:
  quiz_poll:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
